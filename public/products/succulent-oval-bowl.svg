<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420">
  <rect width="620" height="420" fill="#ECE8E2"/>
  <!-- small oval bowl (landscape) -->
  <ellipse cx="310" cy="212" rx="286" ry="196" fill="#D9D3CA" opacity=".5"/>
  <ellipse cx="310" cy="210" rx="278" ry="188" fill="#FBFAF7"/>
  <ellipse cx="310" cy="210" rx="230" ry="150" fill="#F3EEE5"/>
  <ellipse cx="310" cy="210" rx="230" ry="150" fill="none" stroke="#E6DFD2" stroke-width="2"/>

  <!-- teal spiky agave (top left) -->
  <g transform="translate(180 128)">
    <g fill="#5FBFC0">
      <g id="spike"><path d="M0 0 L-9 -52 L0 -66 L9 -52 Z"/></g>
      <use href="#spike" transform="rotate(35)"/><use href="#spike" transform="rotate(-35)"/>
      <use href="#spike" transform="rotate(70)"/><use href="#spike" transform="rotate(-70)"/>
      <use href="#spike" transform="rotate(105)"/><use href="#spike" transform="rotate(-105)"/>
    </g>
    <g fill="#7ED3D2">
      <use href="#spike" transform="scale(.6) rotate(18)"/><use href="#spike" transform="scale(.6) rotate(-18)"/>
      <use href="#spike" transform="scale(.6) rotate(54)"/><use href="#spike" transform="scale(.6) rotate(-54)"/>
    </g>
    <circle r="8" fill="#9CE0DE"/>
  </g>

  <!-- lime maple leaf (mid left) -->
  <g transform="translate(196 268)">
    <path d="M0 46 L-14 20 L-40 26 L-24 4 L-44 -10 L-18 -12 L-22 -40 L0 -22 L22 -40 L18 -12 L44 -10 L24 4 L40 26 L14 20 Z" fill="#AEC93F"/>
    <path d="M0 44 L0 -20" stroke="#93AE2C" stroke-width="2.6" fill="none"/>
  </g>

  <!-- green ruffled echeveria (centre right) -->
  <g transform="translate(400 176)">
    <g fill="#5FA02C">
      <g id="ruf"><ellipse cx="0" cy="-30" rx="16" ry="30"/></g>
      <use href="#ruf" transform="rotate(40)"/><use href="#ruf" transform="rotate(80)"/>
      <use href="#ruf" transform="rotate(120)"/><use href="#ruf" transform="rotate(160)"/>
      <use href="#ruf" transform="rotate(200)"/><use href="#ruf" transform="rotate(240)"/>
      <use href="#ruf" transform="rotate(280)"/><use href="#ruf" transform="rotate(320)"/>
    </g>
    <g fill="#77BC3F" transform="scale(.6)">
      <use href="#ruf"/><use href="#ruf" transform="rotate(60)"/><use href="#ruf" transform="rotate(120)"/>
      <use href="#ruf" transform="rotate(180)"/><use href="#ruf" transform="rotate(240)"/><use href="#ruf" transform="rotate(300)"/>
    </g>
    <circle r="12" fill="#96D45E"/>
  </g>

  <!-- dark green plump succulent (bottom left) -->
  <g transform="translate(250 300)">
    <g fill="#2F6B4A">
      <ellipse cx="-24" cy="6" rx="16" ry="26" transform="rotate(-20 -24 6)"/>
      <ellipse cx="0" cy="-6" rx="17" ry="30"/>
      <ellipse cx="24" cy="6" rx="16" ry="26" transform="rotate(20 24 6)"/>
      <ellipse cx="-12" cy="20" rx="15" ry="24" transform="rotate(-8 -12 20)"/>
      <ellipse cx="14" cy="20" rx="15" ry="24" transform="rotate(8 14 20)"/>
    </g>
    <g fill="#3E7E58">
      <ellipse cx="-8" cy="2" rx="9" ry="16"/><ellipse cx="10" cy="4" rx="9" ry="16"/>
    </g>
  </g>

  <!-- teal maple leaf (mid right) -->
  <g transform="translate(478 296)">
    <path d="M0 40 L-12 18 L-34 22 L-20 4 L-38 -8 L-16 -10 L-18 -34 L0 -18 L18 -34 L16 -10 L38 -8 L20 4 L34 22 L12 18 Z" fill="#5FB9C4"/>
    <path d="M0 38 L0 -16" stroke="#4C9EA8" stroke-width="2.4" fill="none"/>
  </g>

  <!-- green rosette (bottom right) -->
  <g transform="translate(372 306)">
    <g fill="#4E9A2E">
      <g id="ros"><path d="M0 0 C-14 -8 -14 -34 0 -44 C14 -34 14 -8 0 0 Z"/></g>
      <use href="#ros" transform="rotate(45)"/><use href="#ros" transform="rotate(90)"/>
      <use href="#ros" transform="rotate(135)"/><use href="#ros" transform="rotate(180)"/>
      <use href="#ros" transform="rotate(225)"/><use href="#ros" transform="rotate(270)"/>
      <use href="#ros" transform="rotate(315)"/>
    </g>
    <g fill="#6BB63C" transform="scale(.62)">
      <use href="#ros"/><use href="#ros" transform="rotate(60)"/><use href="#ros" transform="rotate(120)"/>
      <use href="#ros" transform="rotate(180)"/><use href="#ros" transform="rotate(240)"/><use href="#ros" transform="rotate(300)"/>
    </g>
    <circle r="8" fill="#8FCD5C"/>
  </g>
</svg>
